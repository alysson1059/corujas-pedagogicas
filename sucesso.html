<!DOCTYPE html>
<html lang="pt-br">
<head>

    <style>
        body { font-family: 'Poppins', sans-serif; background: #f6f8ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; width: 100%; text-align: center; }
        .icon { font-size: 60px; margin-bottom: 10px; }
        h1 { color: #6c5ce7; margin-bottom: 10px; font-size: 26px; }
        p { color: #666; margin-bottom: 25px; line-height: 1.6; }
        
        /* BOTÃO DE DOWNLOAD PRINCIPAL */
        .btn-download { display: block; background: #00b894; color: white; padding: 18px; border-radius: 30px; text-decoration: none; font-weight: 700; font-size: 18px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,184,148,0.3); margin-bottom: 20px; border: none; width: 100%; cursor: pointer; }
        .btn-download:hover { transform: translateY(-3px); background: #00a383; }

        .btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 10px; background: #25d366; color: white; padding: 12px; border-radius: 30px; text-decoration: none; font-weight: 600; font-size: 14px; transition: 0.3s; margin-top: 10px; }
        .btn-whatsapp:hover { background: #128c7e; transform: scale(1.02); }
