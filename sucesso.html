<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processando... - Corujices Pedagógicas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f6f8ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; width: 100%; text-align: center; }
        h1 { color: #6c5ce7; margin-bottom: 10px; font-size: 24px; font-weight: 700; }
        p { color: #666; margin-bottom: 20px; line-height: 1.6; }
        .btn-download { display: block; background: #6c5ce7; color: white; padding: 15px; border-radius: 30px; text-decoration: none; font-weight: 600; transition: 0.3s; margin-top: 20px; }
        .btn-download:hover { background: #5b4bc4; transform: translateY(-2px); }
        .btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 8px; background: #25d366; color: white; padding: 12px; border-radius: 30px; text-decoration: none; font-size: 14px; margin-top: 15px; }
        .spinner { font-size: 60px; margin-bottom: 20px; display: inline-block; animation: rotate 2s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div class="spinner">⏳</div>
    <h1 id="status-title">Processando seu Material...</h1>
    <p id="status-text">O Mercado Pago está confirmando seu pagamento. Assim que aprovado, o material será enviado <b>automaticamente</b> para o seu e-mail.</p>
    
    <p style="font-size: 14px; background: #eee; padding: 10px; border-radius: 10px;">
        📌 <b>Dica:</b> Verifique sua <b>Caixa de Entrada</b> e também a pasta de <b>Spam/Lixo Eletrônico</b>.
    </p>

    <a href="index.html" class="btn-download">Voltar para a Loja</a>

    <a href="https://wa.me/5579996365824?text=Olá! Acabei de fazer um Pix e estou aguardando o material." target="_blank" class="btn-whatsapp">
        🟢 Suporte via WhatsApp
    </a>
</div>

<script>
    // CONFIGURAÇÃO DO SEU ROBÔ
    const scriptURL = "https://script.google.com/macros/s/AKfycby8bYY-SndmN8ChrUQXbBAFYOkmRww8JuSNtqUJsC09bRXofpIh5obDmZ4o3qIuysXg/exec";
    
    // Pegamos os dados que o index.html salvou antes do pagamento
    const email = localStorage.getItem('email_cliente');
    const pdf = localStorage.getItem('pdf_pendente');

    if (email && pdf) {
        // Disparamos o aviso para o Google Script enviar o e-mail
        fetch(`${scriptURL}?email=${encodeURIComponent(email)}&link=${encodeURIComponent(pdf)}&material=Material Pedagógico`)
        .then(response => {
            console.log("Comando enviado ao robô!");
            document.getElementById('status-title').innerText = "Tudo Certo! 🦉";
            document.getElementById('status-text').innerHTML = "Seu material foi disparado para o e-mail: <b>" + email + "</b>. Verifique sua caixa de entrada agora!";
        })
        .catch(error => {
            console.error("Erro ao avisar robô:", error);
        });
    }

    // Limpamos a memória após 10 segundos para não dar erro em futuras compras
    setTimeout(() => {
        localStorage.removeItem('pdf_pendente');
        localStorage.removeItem('email_cliente');
    }, 10000);
</script>

</body>
</html>
