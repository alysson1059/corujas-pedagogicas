<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sucesso! - Corujices Pedagógicas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f6f8ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; width: 100%; text-align: center; }
        h1 { color: #6c5ce7; font-size: 26px; }
        .btn-download { display: block; background: #00b894; color: white; padding: 18px; border-radius: 30px; text-decoration: none; font-weight: 700; margin-top: 20px; transition: 0.3s; }
        .btn-whatsapp { display: block; background: #25d366; color: white; padding: 12px; border-radius: 30px; text-decoration: none; font-weight: 600; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 60px;">🦉</div>
    <h1>Pagamento Confirmado!</h1>
    <p>Seu material já está disponível abaixo e também foi enviado para o seu e-mail.</p>
    
    <div id="download-area">
        <p>Buscando seu arquivo...</p>
    </div>

    <a href="https://wa.me/5579996365824?text=Olá! Tive um problema com o download na Corujices." target="_blank" class="btn-whatsapp">
        🟢 Suporte via WhatsApp
    </a>
</div>

<script>
    const pdfUrl = localStorage.getItem('pdf_pendente');
    const emailCliente = localStorage.getItem('email_cliente');
    const area = document.getElementById('download-area');

    if (pdfUrl && pdfUrl !== 'undefined') {
        area.innerHTML = `<a href="${pdfUrl}" target="_blank" download class="btn-download">📥 BAIXAR MATERIAL (PDF)</a>`;
        
        // ENVIO DO E-MAIL VIA GOOGLE SCRIPT
        if (emailCliente) {
            // COLOQUE O LINK QUE VOCÊ COPIOU NO LUGAR DO LINK ABAIXO:
            const scriptURL = "https://script.google.com/macros/s/AKfycbzzfSRYZTZGHyyCwigZNaBSIlInu-hLGpcXsSVlT2LrsrQLlTbAiB6cW4GiVfaGRgyu/exec";
            
            fetch(`${scriptURL}?email=${encodeURIComponent(emailCliente)}&link=${encodeURIComponent(pdfUrl)}&material=Material Pedagógico`)
            .then(() => console.log("E-mail disparado!"))
            .catch(e => console.error("Erro no e-mail", e));
        }
    } else {
        area.innerHTML = `<p style="color:red">Erro: Link não encontrado. Chame no WhatsApp!</p>`;
    }
</script>

</body>
</html>
