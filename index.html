<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Corujices Pedagógicas | Loja Oficial</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f6f8fb;
color:#2d3436;
}

/* HEADER */

header{
background:white;
padding:18px 6%;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 8px 30px rgba(0,0,0,0.05);
position:sticky;
top:0;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
}

.logo img{
height:46px;
}

.logo h1{
font-size:20px;
color:#F08080;
font-weight:700;
}

/* BOTÕES */

.btn-vendedor,
.btn-anunciar{

background:#F08080;
color:white;
border:none;
padding:10px 22px;
border-radius:30px;
font-size:13px;
font-weight:600;
cursor:pointer;

transition:0.25s;

box-shadow:0 6px 15px rgba(240,128,128,0.25);
}

.btn-vendedor:hover,
.btn-anunciar:hover{

transform:translateY(-2px);

box-shadow:0 10px 25px rgba(240,128,128,0.35);

}

/* HERO */

.hero{

text-align:center;

padding:80px 6% 50px;

background:white;

border-bottom:1px solid #eee;

}

.hero h2{

font-size:34px;

font-weight:700;

margin-bottom:10px;

}

.hero p{

color:#666;

max-width:650px;

margin:auto;

font-size:16px;

}

/* BUSCA */

.search-container{

max-width:620px;

margin:35px auto;

position:relative;

}

.search-container input{

width:100%;

padding:18px 25px;

border-radius:40px;

border:2px solid #eee;

font-size:14px;

outline:none;

transition:0.3s;

}

.search-container input:focus{

border-color:#F08080;

box-shadow:0 8px 20px rgba(0,0,0,0.05);

}

/* CATEGORIAS */

.categories-menu{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:10px;

margin-top:15px;

}

.categories-menu button{

border:none;

padding:9px 18px;

border-radius:25px;

background:#f0f2f5;

font-size:13px;

cursor:pointer;

transition:0.3s;

}

.categories-menu button:hover{

background:#F08080;

color:white;

}

/* STORE */

.store{

max-width:1200px;

margin:auto;

padding:60px 6%;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

gap:30px;

}

/* CARD */

.card{

background:white;

border-radius:16px;

overflow:hidden;

box-shadow:0 15px 40px rgba(0,0,0,0.06);

transition:0.35s;

display:flex;

flex-direction:column;

}

.card:hover{

transform:translateY(-8px);

box-shadow:0 25px 50px rgba(0,0,0,0.1);

}

.card img{

width:100%;

aspect-ratio:1/1;

object-fit:cover;

}

/* INFO */

.info{

padding:20px;

flex:1;

display:flex;

flex-direction:column;

}

.info small{

color:#888;

font-size:12px;

}

.info h3{

font-size:16px;

margin:6px 0 16px;

font-weight:600;

min-height:40px;

}

/* PREÇO */

.price{

font-size:20px;

font-weight:700;

color:#2d3436;

}

/* BOTÃO COMPRA */

.btn-buy{

background:#F08080;

color:white;

border:none;

padding:10px 22px;

border-radius:25px;

font-size:13px;

font-weight:600;

cursor:pointer;

transition:0.25s;

}

.btn-buy:hover{

transform:scale(1.05);

background:#ea6c6c;

}

/* ADMIN */

.admin-zone{

display:none;

padding:12px 15px;

background:#fafafa;

border-top:1px solid #eee;

justify-content:space-between;

}

.btn-adm{

font-size:11px;

cursor:pointer;

font-weight:700;

border:none;

background:none;

color:#636e72;

}

.btn-adm:hover{

color:#F08080;

}

/* MODAL */

.modal{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,0.65);

justify-content:center;

align-items:center;

z-index:2000;

backdrop-filter:blur(6px);

}

.modal-content{

background:white;

padding:40px;

width:95%;

max-width:450px;

border-radius:18px;

text-align:center;

box-shadow:0 25px 60px rgba(0,0,0,0.25);

}

/* INPUT */

input,textarea{

width:100%;

padding:12px;

margin-bottom:15px;

border:1px solid #ddd;

border-radius:8px;

font-size:14px;

}

input:focus,

textarea:focus{

border-color:#F08080;

outline:none;

}

/* AVISO */

#aviso-pendente{

display:none;

background:#F08080;

color:white;

text-align:center;

padding:12px;

font-weight:600;

cursor:pointer;

}

/* FOOTER */

footer{

background:white;

padding:40px 6%;

text-align:center;

border-top:1px solid #eee;

margin-top:60px;

}

footer p:first-child{

font-weight:700;

color:#333;

margin-bottom:5px;

}

footer p:last-child{

color:#777;

font-size:14px;

}

</style>

</head>

<body>

<div id="aviso-pendente" onclick="window.location.href='sucesso.html'">
🦉 Notamos um material pronto para download! Clique aqui para baixar.
</div>

<header>

<a href="index.html" class="logo">

<img src="coruja.png">

<h1>Corujices Pedagógicas</h1>

</a>

<div class="menu">

<button id="btn-login-view" class="btn-vendedor" onclick="fazerLogin()">Vendedor</button>

<div id="user-logged-view" class="user-info" style="display:none;">

<button class="btn-anunciar" onclick="abrirModalCadastro()">+ Novo Material</button>

<button onclick="fazerLogout()" style="background:none;border:none;color:#ff7675;margin-left:10px;cursor:pointer;">Sair</button>

</div>

</div>

</header>

<section class="hero">

<h2>Materiais Pedagógicos</h2>

<p>

Atividades criativas para Educação Infantil.

Baixe, imprima e use em sala de aula em minutos.

</p>

<div class="search-container">

<input type="text" id="inputBusca" placeholder="Pesquisar material ou tema..." oninput="buscarMateriais()">

</div>

<div class="categories-menu" id="menuCategorias"></div>

</section>

<section class="store" id="vitrine"></section>

<footer>

<p>© 2026 Corujices Pedagógicas</p>

<p>Materiais digitais para professores</p>

</footer>

</body>
</html>
